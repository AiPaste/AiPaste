name: Release App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to package, for example v0.1.0"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-release-app:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Select version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi

          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Make build script executable
        run: chmod +x scripts/build_release_app.sh

      - name: Build app bundle
        env:
          VERSION: ${{ steps.version.outputs.value }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/build_release_app.sh "${VERSION}"

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiPaste-${{ steps.version.outputs.value }}-macOS
          path: |
            dist/AiPaste.app
            dist/AiPaste-${{ steps.version.outputs.value }}-macOS.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          gh release create "v${VERSION}" \
            "dist/AiPaste-${VERSION}-macOS.zip" \
            --title "AiPaste v${VERSION}" \
            --generate-notes
