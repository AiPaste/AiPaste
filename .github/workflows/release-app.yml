name: Release App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to package, for example v0.1.0"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-release-app:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Select version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi

          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Make build script executable
        run: |
          chmod +x scripts/build_release_app.sh
          chmod +x scripts/generate_appcast.sh

      - name: Validate Sparkle configuration
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_PUBLIC_ED_KEY}" ]]; then
            echo "Missing SPARKLE_PUBLIC_ED_KEY secret." >&2
            exit 1
          fi
          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret." >&2
            exit 1
          fi

      - name: Build app bundle
        env:
          VERSION: ${{ steps.version.outputs.value }}
          BUILD_NUMBER: ${{ github.run_number }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_APPCAST_URL: https://aipaste.github.io/AiPaste/appcast.xml
        run: ./scripts/build_release_app.sh "${VERSION}"

      - name: Compute release archive checksum
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          ARCHIVE="dist/AiPaste-${VERSION}-macOS.zip"
          SHA256="$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')"
          echo "value=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiPaste-${{ steps.version.outputs.value }}-macOS
          path: |
            dist/AiPaste.app
            dist/AiPaste-${{ steps.version.outputs.value }}-macOS.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          gh release create "v${VERSION}" \
            "dist/AiPaste-${VERSION}-macOS.zip" \
            --title "AiPaste v${VERSION}" \
            --generate-notes

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_DOWNLOAD_URL_PREFIX: https://github.com/AiPaste/AiPaste/releases/download/v${{ steps.version.outputs.value }}/
          SPARKLE_RELEASE_LINK: https://github.com/AiPaste/AiPaste/releases/tag/v${{ steps.version.outputs.value }}
        run: ./scripts/generate_appcast.sh "dist" "dist/appcast.xml"

      - name: Publish Sparkle appcast to GitHub Pages docs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git fetch origin main
          git switch --create main-release-update --track origin/main
          cp "dist/appcast.xml" "docs/appcast.xml"
          if [[ -z "$(git status --porcelain -- docs/appcast.xml)" ]]; then
            echo "Appcast already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update Sparkle appcast to v${VERSION}"
          git push origin HEAD:main

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.value }}
          SHA256: ${{ steps.checksum.outputs.value }}
          TAP_REPOSITORY: AiPaste/homebrew-aipaste
          TAP_BRANCH: main
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]]; then
            echo "Missing HOMEBREW_TAP_GITHUB_TOKEN secret." >&2
            exit 1
          fi
          chmod +x scripts/update_homebrew_cask.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAP_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${TAP_REPOSITORY}.git" "${TAP_DIR}"
          cd "${TAP_DIR}"
          if git ls-remote --exit-code --heads origin "${TAP_BRANCH}" >/dev/null 2>&1; then
            git checkout "${TAP_BRANCH}"
          else
            git checkout --orphan "${TAP_BRANCH}"
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi
          mkdir -p Casks
          cp "${GITHUB_WORKSPACE}/packaging/homebrew/Casks/aipaste.rb" "Casks/aipaste.rb"
          python3 "${GITHUB_WORKSPACE}/scripts/update_homebrew_cask.py" "Casks/aipaste.rb" "${VERSION}" "${SHA256}"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Cask already up to date."
            exit 0
          fi
          git add Casks/aipaste.rb
          git commit -m "Update Homebrew cask to v${VERSION}"
          git push origin "HEAD:${TAP_BRANCH}"
